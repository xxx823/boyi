<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>坐标转换测试</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #f0f0f0;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(10, 50px);
            grid-template-rows: repeat(10, 50px);
            gap: 0;
            border: 2px solid #000;
            margin: 20px 0;
        }
        .square {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
        }
        .light {
            background: #f0d9b5;
        }
        .dark {
            background: #b58863;
            color: white;
        }
        .info {
            background: white;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .error {
            color: red;
            font-weight: bold;
        }
        .success {
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>国际跳棋坐标转换测试</h1>
    
    <div class="info">
        <h3>测试说明：</h3>
        <p>黑格应该显示编号1-50</p>
        <p>第1行（顶部）：1, 2, 3, 4, 5</p>
        <p>第2行：6, 7, 8, 9, 10</p>
        <p>依此类推...</p>
    </div>

    <div id="board" class="board"></div>

    <div id="results" class="info"></div>

    <script>
        // 测试坐标转换函数
        function getSquareIndex(row, col) {
            // 只有黑格有效（row + col为奇数）
            if ((row + col) % 2 === 0) return -1;
            
            // 计算该行的第几个黑格（0-4）
            const blackSquareInRow = Math.floor(col / 2);
            // 返回索引（0-49）
            return row * 5 + blackSquareInRow;
        }

        function getSquareCoords(index) {
            const row = Math.floor(index / 5);
            const blackSquareInRow = index % 5;
            // 偶数行（0,2,4,6,8）：黑格在列1,3,5,7,9
            // 奇数行（1,3,5,7,9）：黑格在列0,2,4,6,8
            const col = (row % 2 === 0) ? (blackSquareInRow * 2 + 1) : (blackSquareInRow * 2);
            return { row, col };
        }

        // 生成棋盘
        const board = document.getElementById('board');
        const results = document.getElementById('results');
        let errors = [];
        let testResults = [];

        for (let row = 0; row < 10; row++) {
            for (let col = 0; col < 10; col++) {
                const square = document.createElement('div');
                square.className = 'square';
                
                if ((row + col) % 2 === 0) {
                    square.classList.add('light');
                    square.textContent = '白';
                } else {
                    square.classList.add('dark');
                    const index = getSquareIndex(row, col);
                    square.textContent = index + 1; // 显示编号1-50
                    
                    // 测试往返转换
                    const coords = getSquareCoords(index);
                    if (coords.row !== row || coords.col !== col) {
                        errors.push(`索引${index}: (${row},${col}) -> (${coords.row},${coords.col})`);
                        square.style.background = 'red';
                    }
                }
                
                board.appendChild(square);
            }
        }

        // 显示测试结果
        let html = '<h3>测试结果：</h3>';
        
        if (errors.length === 0) {
            html += '<p class="success">✅ 所有坐标转换测试通过！</p>';
        } else {
            html += '<p class="error">❌ 发现 ' + errors.length + ' 个错误：</p>';
            html += '<ul>';
            errors.forEach(err => {
                html += '<li class="error">' + err + '</li>';
            });
            html += '</ul>';
        }

        // 测试特定位置
        html += '<h3>关键位置测试：</h3>';
        html += '<ul>';
        
        // 测试第1行（应该是1-5）
        for (let i = 0; i < 5; i++) {
            const coords = getSquareCoords(i);
            html += `<li>编号${i+1} (索引${i}): 行${coords.row}, 列${coords.col}</li>`;
        }
        
        html += '</ul>';

        // 测试黑方初始位置（1-20）
        html += '<h3>黑方初始位置（编号1-20）：</h3>';
        html += '<ul>';
        for (let i = 0; i < 20; i++) {
            const coords = getSquareCoords(i);
            html += `<li>编号${i+1}: 行${coords.row}, 列${coords.col}</li>`;
        }
        html += '</ul>';

        results.innerHTML = html;
    </script>
</body>
</html>
